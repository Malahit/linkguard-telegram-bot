# LinkGuard — self-hosted VPS deploy
# Port plan: api=8081, postgres=5434 (internal)
# System nginx on :80/:443 proxies to api:8081

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: linkguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"  # localhost only — not exposed to internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 8081
      DATABASE_URL: postgresql://linkguard:${POSTGRES_PASSWORD}@postgres:5432/linkguard
    ports:
      - "127.0.0.1:8081:8081"  # localhost only — nginx proxies from outside
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:

# NOTE: No frontend service here.
# The system nginx on this VPS handles :80/:443 and proxies to localhost:8081.
# See step 2/4 (infra/nginx-ssl) for the nginx vhost config.
