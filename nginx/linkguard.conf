# LinkGuard — system nginx vhost
# Place this file at: /etc/nginx/sites-available/linkguard
# Then: sudo ln -s /etc/nginx/sites-available/linkguard /etc/nginx/sites-enabled/
#
# Replace YOURDOMAIN.COM with your real domain before use.
# SSL certs are managed by certbot (see docs/DEPLOY.md, step 4).

# ── HTTP: redirect everything to HTTPS ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN.COM;

    # Certbot ACME challenge (must stay on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: proxy to Docker api on localhost:8081 ──────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOURDOMAIN.COM;

    # SSL — certbot fills these in automatically
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Proxy to api container
    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;

        # WebSocket support (future-proof)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
